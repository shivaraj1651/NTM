services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  - type: web
    name: ntm-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ntm-postgres
          property: connectionString
      - key: MONGODB_URL
        sync: false   # paste your Atlas URL in Render dashboard
      - key: MONGODB_DB
        value: ntm
      - key: REDIS_URL
        fromService:
          name: ntm-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: ntm-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: ntm-redis
          type: redis
          property: connectionString
      # Object storage — point to Cloudflare R2
      - key: S3_ENDPOINT_URL
        sync: false   # e.g. https://<account-id>.r2.cloudflarestorage.com
      - key: S3_PUBLIC_URL
        sync: false   # e.g. https://pub-xxxx.r2.dev
      - key: S3_BUCKET
        value: ntm-assets
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: AWS_REGION
        value: auto
      # Auth
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      # LLM
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Ad platforms
      - key: NTM_ADS_TEST_MODE
        value: "1"
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_CLIENT_ID
        sync: false
      - key: GOOGLE_ADS_CLIENT_SECRET
        sync: false
      - key: GOOGLE_ADS_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_ADS_CUSTOMER_ID
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_SYSTEM_USER_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: KLING_AI_ACCESS_KEY
        sync: false
      - key: KLING_AI_SECRET_KEY
        sync: false
      - key: NTM_STUB_EXTERNAL
        value: "0"
      - key: FRONTEND_URL
        fromService:
          name: ntm-frontend
          type: web
          property: host
          envVarKey: RENDER_EXTERNAL_URL

  # ── Celery Worker ────────────────────────────────────────────────────────────
  - type: worker
    name: ntm-worker
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    dockerCommand: celery -A backend.app.tasks worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ntm-postgres
          property: connectionString
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB
        value: ntm
      - key: REDIS_URL
        fromService:
          name: ntm-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: ntm-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: ntm-redis
          type: redis
          property: connectionString
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: S3_BUCKET
        value: ntm-assets
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: AWS_REGION
        value: auto
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NTM_ADS_TEST_MODE
        value: "1"
      - key: GOOGLE_ADS_DEVELOPER_TOKEN
        sync: false
      - key: GOOGLE_ADS_CLIENT_ID
        sync: false
      - key: GOOGLE_ADS_CLIENT_SECRET
        sync: false
      - key: GOOGLE_ADS_REFRESH_TOKEN
        sync: false
      - key: GOOGLE_ADS_CUSTOMER_ID
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_SYSTEM_USER_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: KLING_AI_ACCESS_KEY
        sync: false
      - key: KLING_AI_SECRET_KEY
        sync: false
      - key: NTM_STUB_EXTERNAL
        value: "0"

  # ── Celery Beat ──────────────────────────────────────────────────────────────
  - type: worker
    name: ntm-beat
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    dockerCommand: celery -A backend.app.tasks beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ntm-postgres
          property: connectionString
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB
        value: ntm
      - key: REDIS_URL
        fromService:
          name: ntm-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: ntm-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: ntm-redis
          type: redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NTM_STUB_EXTERNAL
        value: "0"

  # ── React Frontend ───────────────────────────────────────────────────────────
  - type: web
    name: ntm-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        sync: false   # set to: https://ntm-api.onrender.com/api/v1

databases:
  - name: ntm-postgres
    databaseName: ntm
    user: ntm
    plan: free

  - name: ntm-redis
    plan: free
    ipAllowList: []
